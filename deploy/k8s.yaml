apiVersion: apps/v1
kind: Deployment
metadata: { name: canzap, labels: { app: canzap } }
spec:
  replicas: 1
  selector: { matchLabels: { app: canzap } }
  template:
    metadata: { labels: { app: canzap } }
    spec:
      containers:
        - name: canzap
          image: ghcr.io/cognis-digital/canzap:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: canzap }
spec:
  selector: { app: canzap }
  ports: [{ port: 80, targetPort: 8000 }]
